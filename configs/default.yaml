                }
            },
            "3": {
                "focus": "reasoning",
                "mix": {
                    "basic": 0.2,
                    "instruction": 0.3,
                    "reasoning": 0.5
                }
            },
            "4": {
                "focus": "complex_reasoning",
                "mix": {
                    "complex": 0.3,
                    "instruction": 0.3,
                    "reasoning": 0.4
                }
            },
            "5": {
                "focus": "mastery",
                "mix": {
                    "complex": 0.4,
                    "instruction": 0.3,
                    "reasoning": 0.3
                }
            }
        }
    },
    "dashboard": {
        "poll_interval_ms": 3000,
        "port": 8765
    },
    "datasets": {
        "cache_dir": "data/cache",
        "data_dir": "data/processed",
        "max_samples": 100000,
        "quality_threshold": 0.7,
        "source_workers": 4,
        "sources": [
        ],
        "tokenizer_vocab_size": 32000,
        "trust_remote_code": false
    },
    "evaluation": {
        "benchmarks": [
            "gsm8k",
            "reasoning_probes",
            "instruction_following"
        ],
        "cpu_threads": 4,
        "report_dir": "artifacts",
        "samples_per_benchmark": 100
    },
    "inference": {
        "host": "127.0.0.1",
        "max_length": 512,
        "port": 8766,
        "temperature": 0.7,
        "top_k": 50,
        "top_p": 0.9
    },
    "large_judge": {
        "auto_download_required_models": true,
        "cache_dir": "data/cache/large_judge",
        "enabled": true,
        "fallback_model_ids": [
            "Qwen/Qwen2.5-1.5B-Instruct",
            "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
        ],
        "judge_interval_epochs": 5,
        "model_id": "Qwen/Qwen2.5-3B-Instruct",
