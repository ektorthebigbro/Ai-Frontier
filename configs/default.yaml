{
    "critic": {
        "d_model": 256,
        "enabled": true,
        "learning_rate": 1e-04,
        "n_heads": 4,
        "n_layers": 4,
        "reward_weight": 0.1
    },
    "curriculum": {
        "current_stage": 1,
        "enabled": true,
        "patience_epochs": 3,
        "progression_threshold": 0.02,
        "stages": {
            "1": {
                "focus": "basic_completion",
                "mix": {
                    "basic": 0.8,
                    "reasoning": 0.2
                }
            },
            "2": {
                "focus": "instruction_following",
                "mix": {
                    "basic": 0.4,
                    "instruction": 0.2,
