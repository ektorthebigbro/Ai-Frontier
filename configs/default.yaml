        "batch_item_workers": 4,
        "batch_size": 8,
        "best_checkpoint_count": 5,
        "checkpoint_every": 100,
        "ema_decay": 0.999,
        "eval_every": 500,
        "gradient_accumulation_steps": 4,
        "gradient_checkpointing": true,
        "label_smoothing": 0.1,
        "learning_rate": 2e-04,
        "log_every": 10,
        "max_epochs": 100,
        "max_grad_norm": 1,
        "max_steps": null,
        "micro_batch_size": 2,
        "mixed_precision": true,
        "optimizer_cpu_offload": true,
        "prefetch_batches": 1,
        "synthetic_samples_per_epoch": 50,
        "val_ratio": 0.05,
        "vram_ceiling_gb": 5.5,
        "warmup_steps": 1000,
        "weight_decay": 0.1
    }
